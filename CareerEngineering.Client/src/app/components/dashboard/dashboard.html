<main class="min-h-screen bg-slate-950 text-slate-100 flex flex-col font-sans">
  
    <!-- Header do Dashboard -->
    <header class="border-b border-slate-900 bg-slate-900/20 px-4 py-3 sm:px-6 lg:px-8 flex-shrink-0 z-50 relative">
      <div class="mx-auto max-w-7xl flex items-center justify-between">
        
        <!-- Brand Logo -->
        <div class="flex items-center gap-3">
          <div class="h-8 w-8 rounded-lg bg-emerald-500 flex items-center justify-center font-bold text-slate-950 text-lg">C</div>
          <h1 class="text-xl font-bold tracking-tight bg-gradient-to-r from-slate-100 to-slate-400 bg-clip-text text-transparent">
            CareerEngineering.AI
          </h1>
        </div>
        
        <!-- Lado Direito: Info + Dropdown de Perfil -->
        <div class="flex items-center gap-4">
          <!-- Badge da versão -->
          <span class="hidden md:inline-block text-xs font-semibold px-2.5 py-1 rounded-full bg-slate-900 border border-slate-800 text-emerald-400">
            v1.0 - Local LLM (Llama 3.1)
          </span>
          
          <!-- Bloco do Usuário ISOLADO -->
          @if (user(); as profile) {
            <div class="relative">
              <button 
                (click)="toggleDropdown()"
                class="flex items-center gap-2 focus:outline-none group cursor-pointer">
                
                <div class="h-9 w-9 rounded-full ring-2 ring-emerald-500/30 group-hover:ring-emerald-400 transition-all overflow-hidden bg-slate-800">
                  @if (profile.picture) {
                    <img [src]="profile.picture" [alt]="profile.name" class="h-full w-full object-cover">
                  } @else {
                    <div class="h-full w-full flex items-center justify-center text-slate-200 font-bold text-sm">
                      {{ profile.name?.charAt(0) }}
                    </div>
                  }
                </div>
                
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" 
                  [class.rotate-180]="isDropdownOpen()"
                  class="w-3.5 h-3.5 text-slate-400 group-hover:text-slate-300 transition-transform duration-200">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                </svg>
              </button>
  
              @if (isDropdownOpen()) {
                <div class="fixed inset-0 z-30" (click)="closeDropdown()"></div>
  
                <div class="absolute right-0 mt-2.5 w-60 rounded-2xl border border-slate-800 bg-slate-950 p-2 shadow-2xl z-40 animate-in fade-in slide-in-from-top-2 duration-150">
                  <div class="px-3 py-2.5 border-b border-slate-900/80 mb-1">
                    <p class="text-xs text-slate-500 font-medium">Conta conectada</p>
                    <p class="text-sm font-semibold text-slate-200 truncate mt-0.5">{{ profile.name }}</p>
                    <p class="text-xs text-slate-400 truncate">{{ profile.email }}</p>
                  </div>
  
                  <button 
                    (click)="logout()" 
                    class="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-left text-sm text-slate-400 hover:text-red-400 hover:bg-red-500/5 transition-all cursor-pointer">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15m3 0l3-3m0 0l-3-3m3 3H9" />
                    </svg>
                    Sair do sistema
                  </button>
                </div>
              }
            </div>
          } @else {
            <!-- Fallback simples enquanto o Auth0 carrega os dados do usuário -->
            <div class="h-9 w-9 rounded-full bg-slate-800 animate-pulse"></div>
          }
        </div>
  
      </div>
    </header>
  
    <!-- Corpo do Dashboard (Totalmente fora do escopo do @if do usuário!) -->
    <div class="mx-auto w-full max-w-7xl px-4 py-8 sm:px-6 lg:px-8 flex-1 flex flex-col justify-center">
      
      <div class="grid grid-cols-1 gap-6 md:grid-cols-2 md:h-[600px] w-full">
        
        <!-- Lado Esquerdo (Formulário) -->
        <div class="flex flex-col gap-4 h-full">
          
          <div class="flex flex-col rounded-2xl border border-slate-800 bg-slate-900/60 p-5 shadow-xl flex-1 min-h-[220px]">
            <label class="text-sm font-semibold text-slate-200 mb-2 flex items-center gap-2">
              <span class="inline-block w-2 h-2 rounded-full bg-emerald-500"></span>
              Descrição da Vaga
            </label>
            <textarea 
              [ngModel]="jobDescription()"
              (ngModelChange)="jobDescription.set($event)"
              placeholder="Cole aqui os requisitos da vaga..."
              class="w-full flex-1 p-4 bg-slate-950 text-slate-200 border border-slate-800 rounded-xl resize-none focus:outline-none focus:border-emerald-500 transition-colors text-sm leading-relaxed"></textarea>
          </div>
  
          <div class="flex flex-col rounded-2xl border border-slate-800 bg-slate-900/60 p-5 shadow-xl flex-1 min-h-[220px]">
            <label class="text-sm font-semibold text-slate-200 mb-2 flex items-center gap-2">
              <span class="inline-block w-2 h-2 rounded-full bg-emerald-500"></span>
              Seu Currículo
            </label>
            <textarea 
              [ngModel]="resumeText()"
              (ngModelChange)="resumeText.set($event)"
              placeholder="Cole aqui o texto do seu currículo..."
              class="w-full flex-1 p-4 bg-slate-950 text-slate-200 border border-slate-800 rounded-xl resize-none focus:outline-none focus:border-emerald-500 transition-colors text-sm leading-relaxed"></textarea>
          </div>
  
          <button 
            (click)="analyze()" 
            [disabled]="!canSubmit() || loading()"
            class="w-full h-12 rounded-xl bg-emerald-500 font-semibold text-slate-950 shadow-lg transition-all hover:bg-emerald-400 disabled:opacity-40 disabled:hover:bg-emerald-500 flex items-center justify-center gap-2 flex-shrink-0 cursor-pointer">
            @if (loading()) {
              <span class="animate-spin inline-block w-4 h-4 border-2 border-current border-t-transparent rounded-full"></span>
            }
            Analisar gap
          </button>
        </div>
  
        <!-- Lado Direito (Nosso componente isolado de resultado) -->
        <app-analysis-result 
          [result]="result()" 
          [loading]="loading()" 
          [statusText]="statusText()" />
  
      </div>
    </div>
  </main>
