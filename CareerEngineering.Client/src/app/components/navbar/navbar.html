<header class="h-16 border-b border-slate-900/80 bg-slate-950/50 backdrop-blur-md px-4 sm:px-6 lg:px-8 flex-shrink-0 z-50 relative flex items-center">
  <div class="w-full flex items-center justify-between gap-3">
    <div class="flex items-center gap-3 min-w-0">
      <button
        type="button"
        (click)="onToggleSidebar()"
        class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-slate-800 text-slate-400 hover:text-slate-200 hover:bg-slate-900 transition-colors cursor-pointer flex-shrink-0"
        title="Alternar histórico">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" />
        </svg>
      </button>

      <div class="h-8 w-8 rounded-lg bg-emerald-500 flex items-center justify-center font-bold text-slate-950 text-lg flex-shrink-0">C</div>
      <div class="min-w-0 flex flex-col justify-center leading-tight">
        <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-slate-100 to-slate-400 bg-clip-text text-transparent truncate">
          CareerEngineering.AI
        </span>
        @if (activeTitulo(); as titulo) {
          <p class="text-xs text-slate-500 truncate leading-none mt-0.5">{{ titulo }}</p>
        }
      </div>
    </div>

    <div class="flex items-center gap-4 flex-shrink-0">
      <span class="hidden md:inline-block text-xs font-semibold px-2.5 py-1 rounded-full bg-slate-900 border border-slate-800 text-emerald-400">
        {{ activeModel() }}
      </span>

      @if (user(); as profile) {
        <div class="relative">
          <button
            (click)="toggleDropdown()"
            class="flex items-center gap-2 focus:outline-none group cursor-pointer">
            <div class="h-9 w-9 rounded-full ring-2 ring-emerald-500/30 group-hover:ring-emerald-400 transition-all overflow-hidden bg-slate-800">
              @if (profile.picture) {
                <img [src]="profile.picture" [alt]="profile.name" class="h-full w-full object-cover">
              } @else {
                <div class="h-full w-full flex items-center justify-center text-slate-200 font-bold text-sm">
                  {{ profile.name?.charAt(0) }}
                </div>
              }
            </div>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor"
              [class.rotate-180]="isDropdownOpen()"
              class="w-3.5 h-3.5 text-slate-400 group-hover:text-slate-300 transition-transform duration-200">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
            </svg>
          </button>

          @if (isDropdownOpen()) {
            <div class="fixed inset-0 z-30" (click)="closeDropdown()"></div>
            <div class="absolute right-0 mt-2.5 w-60 rounded-2xl border border-slate-800 bg-slate-950 p-2 shadow-2xl z-40">
              <div class="px-3 py-2.5 border-b border-slate-900/80 mb-1">
                <p class="text-xs text-slate-500 font-medium">Conta conectada</p>
                <p class="text-sm font-semibold text-slate-200 truncate mt-0.5">{{ profile.name }}</p>
                <p class="text-xs text-slate-400 truncate">{{ profile.email }}</p>
              </div>
              <button
                (click)="logout()"
                class="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-left text-sm text-slate-400 hover:text-red-400 hover:bg-red-500/5 transition-all cursor-pointer">
                Sair do sistema
              </button>
              <p class="px-3 pt-2 pb-1 text-[11px] text-slate-600 text-center border-t border-slate-900/80 mt-1">
                CareerEngineering.AI - {{ appVersion }}
              </p>
            </div>
          }
        </div>
      } @else {
        <div class="h-9 w-9 rounded-full bg-slate-800 animate-pulse"></div>
      }
    </div>
  </div>
</header>
