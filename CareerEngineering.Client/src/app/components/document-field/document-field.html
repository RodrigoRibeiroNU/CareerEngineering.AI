<div
  class="relative flex h-full min-h-0 w-full flex-1 flex-col rounded-2xl border bg-slate-900/60 p-5 shadow-xl transition-colors"
  [class.border-slate-800]="!isDragOver()"
  [class.border-2]="isDragOver()"
  [class.border-dashed]="isDragOver()"
  [class.border-emerald-500]="isDragOver()"
  [class.bg-emerald-500/10]="isDragOver()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)">

  <div class="mb-2 flex items-center justify-between gap-3 flex-shrink-0">
    <label class="text-sm font-semibold text-slate-200 flex items-center gap-2 min-w-0">
      <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 shrink-0"></span>
      <span class="truncate">{{ label() }}</span>
    </label>

    <div class="flex items-center gap-1.5 shrink-0">
      @if (fileName()) {
        <span
          class="group inline-flex max-w-[10rem] sm:max-w-[14rem] items-center gap-1 rounded-lg border border-slate-700/80 bg-slate-950/80 px-2 py-1 text-[11px] text-slate-300"
          [title]="fileName()!">
          <span class="truncate">📎 {{ fileName() }}</span>
          <button
            type="button"
            (click)="clearFileSelection()"
            class="shrink-0 rounded p-0.5 text-slate-500 transition-colors hover:bg-slate-800 hover:text-slate-200 cursor-pointer"
            aria-label="Remover arquivo importado"
            title="Remover arquivo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" fill="currentColor" class="h-3 w-3">
              <path
                d="M5.28 4.22a.75.75 0 0 0-1.06 1.06L6.94 8l-2.72 2.72a.75.75 0 1 0 1.06 1.06L8 9.06l2.72 2.72a.75.75 0 1 0 1.06-1.06L9.06 8l2.72-2.72a.75.75 0 0 0-1.06-1.06L8 6.94 5.28 4.22Z" />
            </svg>
          </button>
        </span>
      }

      <button
        type="button"
        (click)="pasteText()"
        [disabled]="parsing()"
        class="inline-flex h-8 w-8 items-center justify-center rounded-lg text-slate-400 transition-colors hover:bg-slate-800 hover:text-emerald-400 disabled:opacity-40 cursor-pointer"
        title="Colar da área de transferência"
        aria-label="Colar da área de transferência">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
          <path
            fill-rule="evenodd"
            d="M8 2a1.5 1.5 0 0 1 1.5-1.5h1A1.5 1.5 0 0 1 12 2v.5h1.75A1.75 1.75 0 0 1 15.5 4.25v10.5A1.75 1.75 0 0 1 13.75 16.5h-7.5A1.75 1.75 0 0 1 4.5 14.75V4.25A1.75 1.75 0 0 1 6.25 2.5H8V2Zm1.5 0h1v.5h-1V2Zm-3.25 2a.25.25 0 0 0-.25.25v10.5c0 .138.112.25.25.25h7.5a.25.25 0 0 0 .25-.25V4.25a.25.25 0 0 0-.25-.25H12V5a1 1 0 0 1-1 1H9a1 1 0 0 1-1-1V4H6.25Z"
            clip-rule="evenodd" />
        </svg>
      </button>

      <button
        type="button"
        (click)="openFilePicker()"
        [disabled]="parsing()"
        class="inline-flex h-8 w-8 items-center justify-center rounded-lg text-slate-400 transition-colors hover:bg-slate-800 hover:text-emerald-400 disabled:opacity-40 cursor-pointer"
        title="Importar PDF, DOCX ou TXT"
        aria-label="Importar PDF, DOCX ou TXT">
        @if (parsing()) {
          <span
            class="inline-block h-3.5 w-3.5 animate-spin rounded-full border-2 border-emerald-400 border-t-transparent"></span>
        } @else {
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
            <path
              fill-rule="evenodd"
              d="M15.621 4.379a3 3 0 0 0-4.242 0l-7 7a3 3 0 0 0 4.241 4.243h.001l.497-.5a.75.75 0 0 1 1.064 1.057l-.498.501-.002.002a4.5 4.5 0 0 1-6.364-6.364l7-7a4.5 4.5 0 0 1 6.368 6.36l-3.455 3.553A2.625 2.625 0 1 1 9.52 9.52l3.45-3.451a.75.75 0 1 1 1.061 1.06l-3.45 3.451a1.125 1.125 0 0 0 1.591 1.59l3.45-3.55a3 3 0 0 0 0-4.242Z"
              clip-rule="evenodd" />
          </svg>
        }
      </button>

      @if (text().trim().length > 0) {
        <button
          type="button"
          (click)="copyText()"
          [disabled]="parsing()"
          class="inline-flex h-8 w-8 items-center justify-center rounded-lg transition-colors hover:bg-slate-800 disabled:opacity-40 cursor-pointer"
          [ngClass]="
            copied() ? 'text-emerald-400' : 'text-slate-400 hover:text-emerald-400'
          "
          [title]="copied() ? 'Copiado!' : 'Copiar texto'"
          [attr.aria-label]="copied() ? 'Texto copiado' : 'Copiar texto'">
          @if (copied()) {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
              <path
                fill-rule="evenodd"
                d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z"
                clip-rule="evenodd" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
              <path
                d="M7 3.5A1.5 1.5 0 0 1 8.5 2h3.879a1.5 1.5 0 0 1 1.06.44l3.122 3.12A1.5 1.5 0 0 1 17 6.622V12.5a1.5 1.5 0 0 1-1.5 1.5h-1v-3.379a3 3 0 0 0-.879-2.121L10.5 4.379A3 3 0 0 0 8.379 3.5H7Z" />
              <path
                d="M4.5 6A1.5 1.5 0 0 0 3 7.5v9A1.5 1.5 0 0 0 4.5 18h7a1.5 1.5 0 0 0 1.5-1.5v-5.879a1.5 1.5 0 0 0-.44-1.06L9.44 6.439A1.5 1.5 0 0 0 8.378 6H4.5Z" />
            </svg>
          }
        </button>

        <button
          type="button"
          (click)="clearText()"
          [disabled]="parsing()"
          class="inline-flex h-8 w-8 items-center justify-center rounded-lg text-slate-400 transition-colors hover:bg-slate-800 hover:text-rose-400 disabled:opacity-40 cursor-pointer"
          title="Limpar campo"
          aria-label="Limpar campo">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
            <path
              fill-rule="evenodd"
              d="M8.75 1A2.75 2.75 0 0 0 6 3.75v.443c-.795.077-1.584.176-2.365.298a.75.75 0 0 0-.624.492 41.3 41.3 0 0 0-1.348 6.973.75.75 0 0 0 .671.884c.54.078 1.086.14 1.637.185V16.25A2.75 2.75 0 0 0 6.75 19h6.5A2.75 2.75 0 0 0 16 16.25v-3.225c.55-.045 1.097-.107 1.637-.185a.75.75 0 0 0 .671-.884 41.3 41.3 0 0 0-1.348-6.973.75.75 0 0 0-.624-.492A44.3 44.3 0 0 0 14 4.193v-.443A2.75 2.75 0 0 0 11.25 1h-2.5ZM10 4c.84 0 1.673.025 2.5.075V3.75c0-.69-.56-1.25-1.25-1.25h-2.5c-.69 0-1.25.56-1.25 1.25v.325C8.327 4.025 9.16 4 10 4ZM8.58 7.72a.75.75 0 0 0-1.5.06l.3 7.5a.75.75 0 1 0 1.5-.06l-.3-7.5Zm4.34.06a.75.75 0 1 0-1.5-.06l-.3 7.5a.75.75 0 1 0 1.5.06l.3-7.5Z"
              clip-rule="evenodd" />
          </svg>
        </button>
      }
    </div>
  </div>

  <input
    #fileInput
    type="file"
    [accept]="accept"
    class="hidden"
    (change)="onFileSelected($event)" />

  <div class="relative flex min-h-0 flex-1 flex-col">
    <textarea
      [ngModel]="text()"
      (ngModelChange)="text.set($event)"
      [placeholder]="placeholder()"
      [disabled]="parsing()"
      class="h-full min-h-0 w-full flex-1 resize-none rounded-xl border border-slate-800 bg-slate-950 p-4 text-sm leading-relaxed text-slate-200 transition-colors focus:border-emerald-500 focus:outline-none disabled:opacity-60"></textarea>

    @if (parsing()) {
      <div
        class="absolute inset-0 flex flex-col items-center justify-center gap-2 rounded-xl bg-slate-950/70 backdrop-blur-[1px]">
        <span
          class="inline-block h-6 w-6 animate-spin rounded-full border-2 border-emerald-400 border-t-transparent"></span>
        <span class="text-xs text-slate-300">Extraindo texto do arquivo...</span>
      </div>
    }

    @if (isDragOver() && !parsing()) {
      <div
        class="pointer-events-none absolute inset-0 flex items-center justify-center rounded-xl border-2 border-dashed border-emerald-500 bg-emerald-500/10">
        <span class="text-sm font-medium text-emerald-300">Solte o arquivo aqui</span>
      </div>
    }
  </div>
</div>
