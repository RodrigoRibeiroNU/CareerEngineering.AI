@if (toast.current(); as msg) {
  <div
    class="fixed bottom-6 left-1/2 z-[100] w-[min(92vw,28rem)] -translate-x-1/2 animate-[toast-in_0.25s_ease-out]"
    role="status"
    aria-live="polite">
    <div
      class="flex items-start gap-3 rounded-xl border px-4 py-3 shadow-2xl backdrop-blur-md"
      [class.border-rose-500/30]="msg.kind === 'error'"
      [class.bg-rose-950/90]="msg.kind === 'error'"
      [class.text-rose-100]="msg.kind === 'error'"
      [class.border-emerald-500/30]="msg.kind === 'success'"
      [class.bg-emerald-950/90]="msg.kind === 'success'"
      [class.text-emerald-100]="msg.kind === 'success'"
      [class.border-slate-600/40]="msg.kind === 'info'"
      [class.bg-slate-900/95]="msg.kind === 'info'"
      [class.text-slate-100]="msg.kind === 'info'">
      <p class="flex-1 text-sm leading-relaxed">{{ msg.text }}</p>
      <button
        type="button"
        (click)="toast.dismiss()"
        class="mt-0.5 shrink-0 rounded-md p-1 text-current/70 transition-colors hover:bg-white/10 hover:text-current cursor-pointer"
        aria-label="Fechar aviso">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4">
          <path
            d="M6.28 5.22a.75.75 0 0 0-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 1 0 1.06 1.06L10 11.06l3.72 3.72a.75.75 0 1 0 1.06-1.06L11.06 10l3.72-3.72a.75.75 0 0 0-1.06-1.06L10 8.94 6.28 5.22Z" />
        </svg>
      </button>
    </div>
  </div>
}
